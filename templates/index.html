<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Котел-охладитель конвертерных газов и газоотводящий тракт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #2a3a5a;
            max-width: 1200px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #eee;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
        .header .stats {
            font-size: 15px;
            background: rgba(255,255,255,0.08);
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
        }
        .header .stats span { font-weight: bold; }
        .header .controls {
            display: flex;
            gap: 10px;
        }
        .header .controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid #3a5a7a;
            color: #ddd;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .header .controls button:hover {
            background: rgba(255,255,255,0.2);
            border-color: #88ccff;
            color: white;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin: 10px 0 15px 0;
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            color: #ccc;
            font-size: 14px;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .scheme-wrapper {
            position: relative;
            background: #0f1a2a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a3a5a;
        }
        .scheme-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e2a3a;
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #3a5a7a;
            color: #eee;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            transition: 0.2s;
            background: none;
            border: none;
        }
        .modal-close:hover { color: white; }
        .modal-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            border-bottom: 1px solid #3a5a7a;
            padding-bottom: 8px;
        }
        .modal-status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            background: #2a3a5a;
        }
        .spare-item {
            background: #0f1a2a;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #4a7a9a;
        }
        .spare-item .info {
            flex: 1;
        }
        .spare-item .info .name {
            font-weight: 600;
        }
        .spare-item .info .detail {
            font-size: 13px;
            color: #88aacc;
            margin-top: 4px;
        }
        .spare-item .actions {
            display: flex;
            gap: 8px;
        }
        .spare-item .actions button {
            background: #2a4a6a;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .spare-item .actions button:hover {
            background: #3a7a9a;
        }
        .spare-item .actions .analog-btn {
            background: #4a6a3a;
        }
        .spare-item .actions .analog-btn:hover {
            background: #5a8a4a;
        }
        .no-spares {
            color: #88aacc;
            text-align: center;
            padding: 20px;
        }
        .footer {
            margin-top: 12px;
            text-align: right;
            color: #6688aa;
            font-size: 13px;
            padding: 0 10px;
        }

        /* Стили для результатов поиска */
        .search-result-item {
            background: #0f1a2a;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px 0;
            border-left: 4px solid #4a9a6a;
        }
        .search-result-item .title {
            font-weight: 600;
            color: #88ddff;
        }
        .search-result-item .url {
            font-size: 12px;
            color: #88aacc;
            word-break: break-all;
        }
        .search-result-item .desc {
            font-size: 13px;
            color: #bbb;
            margin-top: 4px;
        }
        .loading-text {
            text-align: center;
            padding: 30px;
            color: #88aacc;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #ff9966;
        }
        /* Адаптив */
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: start; }
            .header .stats { font-size: 13px; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏭 Котел-охладитель конвертерных газов и газоотводящий тракт</h1>
        <div class="stats">
            ✅ <span id="total">0</span> |
            ⚠️ <span id="warn">0</span> |
            🚨 <span id="danger">0</span>
        </div>
        <div class="controls">
            <button id="sapBtn">🔌 Подключить SAP</button>
            <button id="iisduBtn">📊 Подключить ИИСДУ</button>
        </div>
    </div>
    <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background:#00cc66;"></span> Исправно</div>
        <div class="legend-item"><span class="legend-color" style="background:#ffcc00;"></span> >50% ресурса</div>
        <div class="legend-item"><span class="legend-color" style="background:#ff1a1a;"></span> Превышен ресурс / неисправность</div>
        <div class="legend-item" style="margin-left:auto; color:#88aacc;">🖱 Клик по кружку → детали</div>
    </div>

    <div class="scheme-wrapper">
        <img src="/static/scheme.jpg" alt="Схема газоочистки" id="schemeImg">
        <canvas id="schemeCanvas"></canvas>
    </div>
    <div class="footer">Котел-охладитель • Данные обновляются в реальном времени • версия 2.0 с ИИ</div>
</div>

<!-- Модальное окно -->
<div class="modal" id="modal">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-title" id="modalTitle">Загрузка...</div>
        <div class="modal-status" id="modalStatus">Статус: </div>
        <div id="modalBody">
            <!-- сюда будут вставляться запчасти -->
        </div>
    </div>
</div>

<script>
    // ----- Глобальные данные -----
    let equipmentData = [];
    let sparesData = [];
    let currentModalId = null;
    window.lastSearchResults = [];
    window.lastSearchSpareName = '';

    // ----- Загрузка данных с сервера -----
    async function loadData() {
        try {
            const [eqResp, spResp] = await Promise.all([
                fetch('/api/equipment'),
                fetch('/api/spares')
            ]);
            equipmentData = await eqResp.json();
            sparesData = await spResp.json();
            updateStats();
            drawScene();
        } catch (e) {
            console.error('Ошибка загрузки:', e);
        }
    }

    // ----- Обновление статистики -----
    function updateStats() {
        const total = equipmentData.length;
        const warn = equipmentData.filter(e => e.status === 'yellow').length;
        const danger = equipmentData.filter(e => e.status === 'red').length;
        document.getElementById('total').textContent = total;
        document.getElementById('warn').textContent = warn;
        document.getElementById('danger').textContent = danger;
    }

    // ----- Отрисовка на canvas -----
    const canvas = document.getElementById('schemeCanvas');
    const ctx = canvas.getContext('2d');
    let scaleX = 1, scaleY = 1;

    function drawScene() {
        const img = document.getElementById('schemeImg');
        if (!img.complete) {
            img.onload = () => { drawScene(); };
            return;
        }
        const rect = img.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.scale(dpr, dpr);

        scaleX = rect.width / img.naturalWidth;
        scaleY = rect.height / img.naturalHeight;

        ctx.clearRect(0, 0, rect.width, rect.height);

        equipmentData.forEach(item => {
            const xNorm = (item.x + 5) / 10;
            const zNorm = (item.z + 3) / 6;
            const px = xNorm * rect.width;
            const py = (1 - zNorm) * rect.height;

            const radius = 18;
            const color = getColor(item.status);

            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.id, px, py);

            item._px = px;
            item._py = py;
            item._radius = radius;
        });
    }

    function getColor(status) {
        switch(status) {
            case 'green': return '#00cc66';
            case 'yellow': return '#ffcc00';
            case 'red': return '#ff1a1a';
            default: return '#888888';
        }
    }

    // ----- Обработка кликов по canvas (открытие модалки) -----
    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        let found = null;
        for (let item of equipmentData) {
            if (!item._px) continue;
            const dx = mouseX - item._px;
            const dy = mouseY - item._py;
            if (Math.sqrt(dx*dx + dy*dy) <= item._radius + 8) {
                found = item;
                break;
            }
        }

        if (found) {
            openModal(found.id);
        }
    });

    // ----- Модальное окно -----
    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');
    const modalTitle = document.getElementById('modalTitle');
    const modalStatus = document.getElementById('modalStatus');
    const modalBody = document.getElementById('modalBody');

    function openModal(id) {
        const item = equipmentData.find(e => e.id === id);
        if (!item) return;

        currentModalId = id;
        modalTitle.textContent = item.name;
        const statusText = item.status === 'green' ? '🟢 Исправно' :
                           item.status === 'yellow' ? '🟡 >50% ресурса' :
                           '🔴 Превышен ресурс / неисправность';
        modalStatus.textContent = 'Статус: ' + statusText;
        modalStatus.style.background = item.status === 'green' ? '#1a4a2a' :
                                       item.status === 'yellow' ? '#4a4a1a' : '#4a1a1a';

        // Получаем запчасти для этого узла
        const spares = sparesData.filter(s => s.parent_id === id);
        if (spares.length === 0) {
            modalBody.innerHTML = '<div class="no-spares">Нет запчастей для этого узла</div>';
        } else {
            let html = '';
            spares.forEach(s => {
                html += `
                    <div class="spare-item">
                        <div class="info">
                            <div class="name">${s.name}</div>
                            <div class="detail">${s.manufacturer || ''} ${s.part_number ? 'Арт. '+s.part_number : ''} ${s.sap_code ? 'SAP: '+s.sap_code : ''}</div>
                            <div class="detail" style="font-size:12px; color:#8899aa;">Цена: ${s.price || '—'} | Срок: ${s.delivery_time || '—'}</div>
                        </div>
                        <div class="actions">
                            <button class="analog-btn" data-id="${s.id}">🔍 Найти аналоги</button>
                        </div>
                    </div>
                `;
            });
            modalBody.innerHTML = html;

            // Вешаем обработчики на кнопки "Найти аналоги"
            modalBody.querySelectorAll('.analog-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const spareId = parseInt(this.dataset.id);
                    findAnalog(spareId);
                });
            });
        }

        modal.classList.add('active');
    }

    function closeModal() {
        modal.classList.remove('active');
        // Очищаем контейнер результатов, чтобы не было мусора
        const oldResults = document.getElementById('analogResults');
        if (oldResults) oldResults.remove();
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });

    // ----- Функция поиска аналогов -----
    async function findAnalog(spareId) {
        const spare = sparesData.find(s => s.id === spareId);
        if (!spare) return;

        // Удаляем старый контейнер результатов, если есть
        const oldResults = document.getElementById('analogResults');
        if (oldResults) oldResults.remove();

        const resultsContainer = document.createElement('div');
        resultsContainer.id = 'analogResults';
        resultsContainer.innerHTML = '<div class="loading-text">⏳ Поиск аналогов в интернете...</div>';
        
        const spareItems = modalBody.querySelectorAll('.spare-item');
        if (spareItems.length) {
            spareItems[spareItems.length - 1].after(resultsContainer);
        } else {
            modalBody.appendChild(resultsContainer);
        }

        try {
            const response = await fetch('/api/search-analogs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: spare.id,
                    name: spare.name, 
                    part_number: spare.part_number,
                    manufacturer: spare.manufacturer
                })
            });
            const data = await response.json();

            // Сохраняем результаты для экспорта
            window.lastSearchResults = data.success && data.results ? data.results : [];
            window.lastSearchSpareName = spare.name;

            let html = '';
            if (data.success && data.results && data.results.length > 0) {
                html = `<div style="margin-top:16px; border-top:1px solid #3a5a7a; padding-top:16px;">
                        <h3 style="color:#88ddff;">🌐 Найденные аналоги в интернете</h3>`;
                data.results.forEach((item) => {
                    html += `
                        <div class="search-result-item">
                            <div class="title"><a href="${item.url}" target="_blank" style="color:#88ddff; text-decoration:none;">${item.title}</a></div>
                            <div class="url">${item.url}</div>
                            <div class="desc">${item.description || ''}</div>
                        </div>
                    `;
                });
                // Кнопки экспорта
                html += `
                    <div style="margin-top:12px; display:flex; gap:10px; justify-content:flex-end;">
                        <button id="exportExcelBtn" style="background:#2a5a3a; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer;">📊 Экспорт в Excel</button>
                        <button id="exportPdfBtn" style="background:#5a3a2a; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer;">📄 Экспорт в PDF</button>
                    </div>
                `;
                html += `</div>`;
            } else {
                html = `<div class="no-results">❌ По запросу "${spare.name}" ничего не найдено.</div>`;
            }
            resultsContainer.innerHTML = html;

            // Обработчики кнопок экспорта
            document.getElementById('exportExcelBtn')?.addEventListener('click', function() {
                exportResults('excel');
            });
            document.getElementById('exportPdfBtn')?.addEventListener('click', function() {
                exportResults('pdf');
            });

        } catch (error) {
            console.error('Ошибка поиска:', error);
            resultsContainer.innerHTML = `<div class="no-results">❌ Ошибка при поиске аналогов.</div>`;
        }
    }

    // ----- Функция экспорта результатов -----
    async function exportResults(format) {
        const results = window.lastSearchResults || [];
        const spareName = window.lastSearchSpareName || 'Неизвестно';
        if (results.length === 0) {
            alert('Нет результатов для экспорта. Сначала выполните поиск.');
            return;
        }

        try {
            const response = await fetch(`/api/export/${format}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ results, spare_name: spareName })
            });
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `analogs_${spareName.slice(0,20)}.${format === 'excel' ? 'xlsx' : 'pdf'}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } else {
                alert('Ошибка экспорта. Попробуйте позже.');
            }
        } catch (error) {
            console.error('Ошибка экспорта:', error);
            alert('Ошибка при экспорте.');
        }
    }

    // ----- Кнопки управления (заглушки для SAP и ИИСДУ) -----
    document.getElementById('sapBtn').addEventListener('click', function() {
        alert(
            '🔌 Подключение к SAP ERP\n' +
            'В реальной версии здесь будет настройка соединения с SAP через RFC или REST API.\n' +
            'Параметры: сервер, клиент, пользователь, пароль.\n' +
            'После подключения кнопка "Найти аналоги" будет запрашивать данные из SAP.'
        );
    });

    document.getElementById('iisduBtn').addEventListener('click', function() {
        alert(
            '📊 Подключение к ИИСДУ (система мониторинга)\n' +
            'В реальной версии здесь будет настройка получения данных с датчиков (вибрация, температура).\n' +
            'Для каждого узла можно задать формулу расчёта остаточного ресурса.\n' +
            'Например, для насоса: остаточный ресурс = f(вибрация, температура, наработка).\n' +
            'При превышении порогов статус будет меняться на "желтый" или "красный" автоматически.'
        );
    });

    // ----- Запуск загрузки -----
    loadData();
    window.addEventListener('resize', () => { if (equipmentData.length) drawScene(); });
</script>
</body>
</html>
